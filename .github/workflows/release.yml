name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          cp translate_worker.py calibre-plugin/
          cd calibre-plugin
          zip -r ../EpubTranslate.zip . --exclude '*.DS_Store' --exclude '__pycache__/*'

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: EpubTranslate.zip
          generate_release_notes: true
